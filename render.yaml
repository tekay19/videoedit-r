# Render Blueprint — backend (render-service) tek tikla deploy
# Render Dashboard → New → Blueprint → bu repoyu sec → render.yaml otomatik okunur.
services:
  - type: web
    name: reels-render
    runtime: docker
    rootDir: render-service     # Dockerfile bu klasorde — Render'a burayi kok goster
    dockerContext: .            # rootDir'e gore (yani render-service/)
    dockerfilePath: Dockerfile  # rootDir'e gore
    plan: free                  # render agirsa "starter"/"standard" yap (daha cok RAM/CPU)
    region: frankfurt
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: ALLOW_ORIGIN
        value: "*"              # prod'da Vercel domainini yaz
