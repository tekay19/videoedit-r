# Render Blueprint — backend (render-service) tek tikla deploy
# Render Dashboard → New → Blueprint → bu repoyu sec → render.yaml otomatik okunur.
services:
  - type: web
    name: reels-render
    runtime: docker
    rootDir: render-service
    dockerfilePath: ./Dockerfile
    plan: free            # video render agirsa "starter" / "standard" yap (daha cok RAM/CPU)
    region: frankfurt
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: ALLOW_ORIGIN
        value: "*"        # prod'da Vercel domainini yaz (or. https://videoedit-r.vercel.app)
